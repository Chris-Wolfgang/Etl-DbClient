name: Benchmarks (per-RDBMS) → gh-pages

# Run BenchmarkDotNet against each supported RDBMS and publish the results to
# gh-pages so we can track perf trends over time. Charts land at
# https://chris-wolfgang.github.io/Etl-DbClient/dev/bench/<rdbms>/.
#
# Triggers:
#   - workflow_dispatch — ad-hoc runs from the Actions tab
#   - tag push (v*)      — auto-snapshot at release time

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write    # benchmark-action pushes commits to gh-pages
  deployments: write # benchmark-action records a deployment

concurrency:
  group: benchmarks-${{ github.ref }}
  cancel-in-progress: false

# Jobs are intentionally serialized via `needs:` so they don't race to push to
# gh-pages. benchmark-action/github-action-benchmark commits + force-pushes the
# benchmark history file (`data.js`) per run; parallel pushes would either
# clobber each other or hit non-fast-forward errors. Per-provider charts each
# live under their own `dev/bench/<rdbms>/` directory, but the action also
# updates a shared metadata file so chaining is the safest model.
jobs:

  # ============================================================================
  # SQLite (no container needed)
  # ============================================================================
  benchmark-sqlite:
    name: "Benchmarks / sqlite"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Run benchmarks
        env:
          ETL_DBCLIENT_BENCHMARK_RDBMS: sqlite
        run: |
          dotnet run -c Release \
            --project benchmarks/Wolfgang.Etl.DbClient.Benchmarks/Wolfgang.Etl.DbClient.Benchmarks.csproj \
            -- --filter "*ExtractorBenchmarks*" --exporters json --artifacts BDN_OUT

      - name: Publish to gh-pages
        uses: benchmark-action/github-action-benchmark@d48d326b4ca9ba73ca0cd0d59f108f9e02a381c7 # v1.20.4
        with:
          name: "ExtractorBenchmarks (sqlite)"
          tool: 'benchmarkdotnet'
          output-file-path: BDN_OUT/results/Wolfgang.Etl.DbClient.Benchmarks.ExtractorBenchmarks-report-full-compressed.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: dev/bench/sqlite
          alert-threshold: '150%'
          comment-on-alert: true
          fail-on-alert: false

  # ============================================================================
  # SQL Server
  # ============================================================================
  benchmark-sqlserver:
    name: "Benchmarks / sqlserver"
    runs-on: ubuntu-latest
    needs: benchmark-sqlite
    services:
      mssql:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: "Y"
          MSSQL_SA_PASSWORD: "Bench-SA-Pass-1!"
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P Bench-SA-Pass-1! -Q 'SELECT 1' || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 20
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Run benchmarks
        env:
          ETL_DBCLIENT_BENCHMARK_RDBMS: sqlserver
          ETL_DBCLIENT_BENCHMARK_MSSQL: "Server=localhost,1433;Database=master;User Id=sa;Password=Bench-SA-Pass-1!;Encrypt=False;TrustServerCertificate=True"
        run: |
          dotnet run -c Release \
            --project benchmarks/Wolfgang.Etl.DbClient.Benchmarks/Wolfgang.Etl.DbClient.Benchmarks.csproj \
            -- --filter "*ExtractorBenchmarks*" --exporters json --artifacts BDN_OUT

      - name: Publish to gh-pages
        uses: benchmark-action/github-action-benchmark@d48d326b4ca9ba73ca0cd0d59f108f9e02a381c7 # v1.20.4
        with:
          name: "ExtractorBenchmarks (sqlserver)"
          tool: 'benchmarkdotnet'
          output-file-path: BDN_OUT/results/Wolfgang.Etl.DbClient.Benchmarks.ExtractorBenchmarks-report-full-compressed.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: dev/bench/sqlserver
          alert-threshold: '150%'
          comment-on-alert: true
          fail-on-alert: false

  # ============================================================================
  # PostgreSQL
  # ============================================================================
  benchmark-postgres:
    name: "Benchmarks / postgres"
    runs-on: ubuntu-latest
    needs: benchmark-sqlserver
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: bench
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Run benchmarks
        env:
          ETL_DBCLIENT_BENCHMARK_RDBMS: postgres
          ETL_DBCLIENT_BENCHMARK_PG: "Host=localhost;Port=5432;Database=bench;Username=postgres;Password=postgres"
        run: |
          dotnet run -c Release \
            --project benchmarks/Wolfgang.Etl.DbClient.Benchmarks/Wolfgang.Etl.DbClient.Benchmarks.csproj \
            -- --filter "*ExtractorBenchmarks*" --exporters json --artifacts BDN_OUT

      - name: Publish to gh-pages
        uses: benchmark-action/github-action-benchmark@d48d326b4ca9ba73ca0cd0d59f108f9e02a381c7 # v1.20.4
        with:
          name: "ExtractorBenchmarks (postgres)"
          tool: 'benchmarkdotnet'
          output-file-path: BDN_OUT/results/Wolfgang.Etl.DbClient.Benchmarks.ExtractorBenchmarks-report-full-compressed.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: dev/bench/postgres
          alert-threshold: '150%'
          comment-on-alert: true
          fail-on-alert: false

  # ============================================================================
  # MySQL
  # ============================================================================
  benchmark-mysql:
    name: "Benchmarks / mysql"
    runs-on: ubuntu-latest
    needs: benchmark-postgres
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: mysql
          MYSQL_DATABASE: bench
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost -uroot -pmysql"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 20
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Run benchmarks
        env:
          ETL_DBCLIENT_BENCHMARK_RDBMS: mysql
          # AllowPublicKeyRetrieval=True is required for MySQL 8's default
          # caching_sha2_password auth when not using TLS.
          ETL_DBCLIENT_BENCHMARK_MYSQL: "Server=localhost;Port=3306;Database=bench;User Id=root;Password=mysql;SslMode=None;AllowPublicKeyRetrieval=True"
        run: |
          dotnet run -c Release \
            --project benchmarks/Wolfgang.Etl.DbClient.Benchmarks/Wolfgang.Etl.DbClient.Benchmarks.csproj \
            -- --filter "*ExtractorBenchmarks*" --exporters json --artifacts BDN_OUT

      - name: Publish to gh-pages
        uses: benchmark-action/github-action-benchmark@d48d326b4ca9ba73ca0cd0d59f108f9e02a381c7 # v1.20.4
        with:
          name: "ExtractorBenchmarks (mysql)"
          tool: 'benchmarkdotnet'
          output-file-path: BDN_OUT/results/Wolfgang.Etl.DbClient.Benchmarks.ExtractorBenchmarks-report-full-compressed.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: dev/bench/mysql
          alert-threshold: '150%'
          comment-on-alert: true
          fail-on-alert: false

  # ============================================================================
  # MariaDB (MySQL-compatible wire protocol; same MySqlConnector driver)
  # ============================================================================
  benchmark-mariadb:
    name: "Benchmarks / mariadb"
    runs-on: ubuntu-latest
    needs: benchmark-mysql
    services:
      mariadb:
        image: mariadb:11.4.4
        env:
          MARIADB_ROOT_PASSWORD: mariadb
          MARIADB_DATABASE: bench
        ports:
          - 3306:3306
        options: >-
          --health-cmd "healthcheck.sh --connect --innodb_initialized"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 20
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Run benchmarks
        env:
          ETL_DBCLIENT_BENCHMARK_RDBMS: mariadb
          # Match the MySQL connection-string flags — MariaDB optionally supports
          # caching_sha2_password since 10.6 and shares the MySqlConnector driver.
          ETL_DBCLIENT_BENCHMARK_MARIADB: "Server=localhost;Port=3306;Database=bench;User Id=root;Password=mariadb;SslMode=None;AllowPublicKeyRetrieval=True"
        run: |
          dotnet run -c Release \
            --project benchmarks/Wolfgang.Etl.DbClient.Benchmarks/Wolfgang.Etl.DbClient.Benchmarks.csproj \
            -- --filter "*ExtractorBenchmarks*" --exporters json --artifacts BDN_OUT

      - name: Publish to gh-pages
        uses: benchmark-action/github-action-benchmark@d48d326b4ca9ba73ca0cd0d59f108f9e02a381c7 # v1.20.4
        with:
          name: "ExtractorBenchmarks (mariadb)"
          tool: 'benchmarkdotnet'
          output-file-path: BDN_OUT/results/Wolfgang.Etl.DbClient.Benchmarks.ExtractorBenchmarks-report-full-compressed.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: dev/bench/mariadb
          alert-threshold: '150%'
          comment-on-alert: true
          fail-on-alert: false

  # ============================================================================
  # CockroachDB (PostgreSQL wire-compatible; same Npgsql driver)
  # The cockroachdb/cockroach image's CMD must be 'start-single-node ...', but
  # GitHub Actions services: blocks can't override CMD, so we launch the
  # container manually instead.
  # ============================================================================
  benchmark-cockroachdb:
    name: "Benchmarks / cockroachdb"
    runs-on: ubuntu-latest
    needs: benchmark-mariadb
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Start CockroachDB
        run: |
          docker run -d --name crdb \
            -p 26257:26257 -p 8080:8080 \
            cockroachdb/cockroach:v24.3.5 \
            start-single-node --insecure --accept-sql-without-tls
          # Wait for /health?ready=1 — SQL port opens a few seconds before
          # the engine is actually accepting queries. If it never reports
          # ready inside the budget, fail the step explicitly (and dump
          # container logs) so downstream benchmark failures point at the
          # real cause instead of a misleading connection error.
          ready=0
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/health?ready=1 > /dev/null; then
              echo "CockroachDB ready after $i attempt(s)"
              ready=1
              break
            fi
            echo "Waiting for CockroachDB... ($i/30)"
            sleep 2
          done
          if [ "$ready" != "1" ]; then
            echo "::error::CockroachDB did not become ready within 60s"
            docker logs crdb || true
            exit 1
          fi

      - name: Run benchmarks
        env:
          ETL_DBCLIENT_BENCHMARK_RDBMS: cockroachdb
          # Insecure single-node defaults: user 'root', no password, database 'defaultdb'.
          ETL_DBCLIENT_BENCHMARK_COCKROACHDB: "Host=localhost;Port=26257;Database=defaultdb;Username=root;"
        run: |
          dotnet run -c Release \
            --project benchmarks/Wolfgang.Etl.DbClient.Benchmarks/Wolfgang.Etl.DbClient.Benchmarks.csproj \
            -- --filter "*ExtractorBenchmarks*" --exporters json --artifacts BDN_OUT

      - name: Stop CockroachDB
        if: always()
        run: docker rm -f crdb || true

      - name: Publish to gh-pages
        uses: benchmark-action/github-action-benchmark@d48d326b4ca9ba73ca0cd0d59f108f9e02a381c7 # v1.20.4
        with:
          name: "ExtractorBenchmarks (cockroachdb)"
          tool: 'benchmarkdotnet'
          output-file-path: BDN_OUT/results/Wolfgang.Etl.DbClient.Benchmarks.ExtractorBenchmarks-report-full-compressed.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: dev/bench/cockroachdb
          alert-threshold: '150%'
          comment-on-alert: true
          fail-on-alert: false
