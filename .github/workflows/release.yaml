name: Release on Published Release


on:
  release:
    types: [published]

permissions:
  contents: read  # Default to read-only; individual jobs declare write where required

env:
  CODECOV_MINIMUM: 90

concurrency:
  # Serialize releases so a duplicate / re-published Release event can't run two
  # publish pipelines against NuGet and gh-pages at once. Never cancel an
  # in-flight release — a half-published package family is worse than a queued one.
  group: release-${{ github.event.release.tag_name || github.ref }}
  cancel-in-progress: false

jobs:
  # Streamlined validation: All frameworks, Windows only
  validate-release:
    name: Validate Release Build
    runs-on: windows-latest
    if: github.repository != 'Chris-Wolfgang/repo-template'
    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false

      - name: Validate release tag matches csproj version
        shell: pwsh
        env:
          RELEASE_TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          # Strip leading 'v' or 'v.' from the tag (v0.3.0 -> 0.3.0, v.0.1.0 -> 0.1.0)
          $tagName = $env:RELEASE_TAG_NAME
          $tagVersion = $tagName -replace '^v\.?', ''
          Write-Host "Release tag:      $tagName" -ForegroundColor Cyan
          Write-Host "Expected version: $tagVersion" -ForegroundColor Cyan
          Write-Host ""

          $srcCsprojs = @(Get-ChildItem -Path './src' -Recurse -Filter '*.csproj' -ErrorAction SilentlyContinue)
          if ($srcCsprojs.Count -eq 0) {
            Write-Warning "No src csprojs found - skipping version validation"
            exit 0
          }

          # Collect <Version> and <PackageVersion> values from every src csproj
          $found = @()
          foreach ($proj in $srcCsprojs) {
            try {
              [xml]$xml = Get-Content $proj.FullName -Raw
              $nodes = $xml.SelectNodes('//Version | //PackageVersion')
              foreach ($node in $nodes) {
                $v = $node.InnerText.Trim()
                if ($v) {
                  $found += [pscustomobject]@{ Project = $proj.Name; Version = $v }
                }
              }
            } catch {
              Write-Warning "Failed to parse $($proj.Name): $($_.Exception.Message)"
            }
          }

          Write-Host "Versions found in src csprojs:" -ForegroundColor Cyan
          foreach ($f in $found) {
            Write-Host "  $($f.Project): $($f.Version)" -ForegroundColor DarkGray
          }
          Write-Host ""

          if ($found.Count -eq 0) {
            Write-Error "No <Version> or <PackageVersion> found in any src csproj"
            exit 1
          }

          if ($found.Version -contains $tagVersion) {
            Write-Host "Release tag matches at least one src csproj version" -ForegroundColor Green
          } else {
            $allVersions = ($found.Version | Sort-Object -Unique) -join ', '
            Write-Error "Release tag '$tagName' (version '$tagVersion') does not match any src csproj version. Found: $allVersions. Bump the csproj <Version> or correct the release tag before re-running."
            exit 1
          }

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            3.1.x
            5.0.x
            6.0.x
            7.0.x
            8.0.x
            9.0.x
            10.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Build Solution (Release)
        run: dotnet build --no-restore --configuration Release

      - name: Run multi-framework tests with coverage
        shell: pwsh
        run: |
          # Exclude *.Tests.Integration.* from THIS Windows job — it runs the
          # unit suite only. Integration tests need Testcontainers (Linux), and
          # are gated by the dedicated test-integration matrix job below
          # (publish-nuget needs:[…, test-integration-all]) so a release still
          # can't ship if any provider's integration suite is red.
          # Match the per-language SDK extensions (cs / vb / fs).
          $testProjects = Get-ChildItem -Path './tests' -Recurse -Include '*Test*.csproj', '*Test*.vbproj', '*Test*.fsproj' |
            Where-Object { $_.Name -notmatch '\.Tests\.Integration\.(cs|vb|fs)proj$' }

          if ($testProjects.Count -eq 0) {
            Write-Error "❌ No test projects found - release requires tests to validate quality"
            exit 1
          }
          
          foreach ($testProj in $testProjects) {
            Write-Host "==========================================" -ForegroundColor Cyan
            Write-Host "Testing project: $($testProj.Name)" -ForegroundColor Cyan
            Write-Host "==========================================" -ForegroundColor Cyan
            
            # Parse the project file to extract target frameworks
            try {
              [xml]$projectXml = Get-Content $testProj.FullName
            } catch {
              Write-Error "❌ Failed to parse project file $($testProj.Name): $_"
              exit 1
            }
            
            # Search all PropertyGroup elements for TargetFramework(s)
            $targetFramework = $null
            $targetFrameworks = $null
            foreach ($propGroup in $projectXml.Project.PropertyGroup) {
              if ($propGroup.TargetFrameworks) {
                $targetFrameworks = $propGroup.TargetFrameworks
                break
              } elseif ($propGroup.TargetFramework) {
                $targetFramework = $propGroup.TargetFramework
                break
              }
            }
            
            # Determine which frameworks this project targets
            $frameworks = @()
            if ($targetFrameworks) {
              # Multiple frameworks (semicolon-separated)
              $frameworks = $targetFrameworks -split ';' | ForEach-Object { $_.Trim() } | Where-Object { $_ }
              if ($frameworks.Count -eq 0) {
                Write-Error "❌ TargetFrameworks property in $($testProj.Name) is empty or malformed"
                exit 1
              }
            } elseif ($targetFramework) {
              # Single framework
              $frameworks = @($targetFramework.Trim())
              if (-not $frameworks[0]) {
                Write-Error "❌ TargetFramework property in $($testProj.Name) is empty"
                exit 1
              }
            } else {
              # If no TargetFramework/TargetFrameworks are defined directly in the project file,
              # attempt to resolve them via MSBuild (to account for Directory.Build.props, imports, etc.).
              Write-Host "No TargetFramework or TargetFrameworks found directly in $($testProj.Name); querying MSBuild..." -ForegroundColor Yellow
              
              $msbuildOutput = @()
              $msbuildExitCode = 0
              foreach ($prop in @("TargetFrameworks", "TargetFramework")) {
                $result = dotnet msbuild $testProj.FullName /nologo "-getProperty:$prop" 2>&1
                if ($LASTEXITCODE -ne 0) {
                  $msbuildExitCode = $LASTEXITCODE
                }
                if ($result) {
                  $msbuildOutput += $result
                }
              }
              
              if ($msbuildExitCode -ne 0) {
                # MSBuild query failed, fall back to running tests without explicit --framework
                Write-Warning "MSBuild query failed for $($testProj.Name). Tests will run without explicit --framework."
                $frameworks = @('')
              } else {
                # MSBuild succeeded, parse the output
                $resolvedFrameworks = @()
                foreach ($line in $msbuildOutput) {
                  if ([string]::IsNullOrWhiteSpace($line)) {
                    continue
                  }
                  
                  # Expect lines like "TargetFrameworks=net7.0;net8.0" or "TargetFramework=net8.0"
                  # Support both '=' and ':' separators for different MSBuild output formats
                  if ($line -match '^\s*TargetFrameworks\s*[:=]\s*(.+)$') {
                    $propertyValue = $Matches[1].Trim()
                    $resolvedFrameworks = $propertyValue -split ';' | ForEach-Object { $_.Trim() } | Where-Object { $_ }
                    break
                  } elseif ($line -match '^\s*TargetFramework\s*[:=]\s*(.+)$') {
                    $propertyValue = $Matches[1].Trim()
                    if ($propertyValue) {
                      $resolvedFrameworks = @($propertyValue)
                    }
                    
                    if ($resolvedFrameworks.Count -gt 0) {
                      break
                    }
                  }
                }
                
                if ($resolvedFrameworks.Count -gt 0) {
                  $frameworks = $resolvedFrameworks
                } else {
                  Write-Warning "MSBuild query returned no target frameworks for $($testProj.Name). Tests will run without explicit --framework."
                  $frameworks = @('')
                }
              }
            }
            
            Write-Host "Detected frameworks: $($frameworks -join ', ')" -ForegroundColor Cyan
            
            foreach ($fw in $frameworks) {
              if ([string]::IsNullOrWhiteSpace($fw)) {
                Write-Host "Testing project $($testProj.Name) without explicit --framework (using SDK/MSBuild defaults)" -ForegroundColor Yellow
                
                # When framework cannot be determined, run tests once without specifying --framework.
                # Collect coverage in this case to avoid missing data due to unknown TFM.
                dotnet test $testProj.FullName `
                  --configuration Release `
                  --no-build `
                  --no-restore `
                  --collect:"XPlat Code Coverage" `
                  --results-directory "./TestResults" `
                  --logger "console;verbosity=minimal"
                
                if ($LASTEXITCODE -ne 0) {
                  Write-Error "❌ Tests failed (no explicit TargetFramework) in $($testProj.Name)"
                  exit $LASTEXITCODE
                }
                
                continue
              }
              
              Write-Host "Testing framework: $fw" -ForegroundColor Yellow
              
              # Collect coverage only for .NET 5.0+ TFMs; still run tests for all frameworks
              if ($fw -match '^net([5-9]|[1-9][0-9]+)\.') {
                dotnet test $testProj.FullName `
                  --configuration Release `
                  --framework $fw `
                  --no-build `
                  --no-restore `
                  --collect:"XPlat Code Coverage" `
                  --results-directory "./TestResults" `
                  --logger "console;verbosity=minimal"
              } else {
                # For older frameworks (e.g., netstandard, net4x, net3x, etc.), run tests without coverage
                dotnet test $testProj.FullName `
                  --configuration Release `
                  --framework $fw `
                  --no-build `
                  --no-restore `
                  --results-directory "./TestResults" `
                  --logger "console;verbosity=minimal"
              }
              
              if ($LASTEXITCODE -ne 0) {
                if ($fw) {
                  Write-Error "❌ Tests failed for $fw in $($testProj.Name)"
                } else {
                  Write-Error "❌ Tests failed in $($testProj.Name)"
                }
                exit $LASTEXITCODE
              }
            }
            Write-Host ""
          }
          Write-Host "✅ All framework tests passed" -ForegroundColor Green

      - name: Verify coverage threshold
        shell: pwsh
        run: |
          # Check if coverage files exist
          $coverageFiles = Get-ChildItem -Path "TestResults" -Recurse -Filter "coverage.cobertura.xml" -ErrorAction SilentlyContinue
          
          if ($coverageFiles.Count -eq 0) {
            Write-Error "❌ No coverage files found - coverage data is required to enforce the 90% threshold"
            exit 1
          }
          
          dotnet tool install -g dotnet-reportgenerator-globaltool
          
          reportgenerator `
            -reports:"TestResults/**/coverage.cobertura.xml" `
            -targetdir:"CoverageReport" `
            -reporttypes:"TextSummary;Html"
          
          Write-Host "==========================================" -ForegroundColor Cyan
          Write-Host "Coverage Summary:" -ForegroundColor Cyan
          Write-Host "==========================================" -ForegroundColor Cyan
          Get-Content CoverageReport/Summary.txt
          Write-Host ""
          
          # Parse coverage and enforce threshold per module (matching pr.yaml)
          $summaryContent = Get-Content CoverageReport/Summary.txt
          $threshold = if ($env:CODECOV_MINIMUM) { [int]$env:CODECOV_MINIMUM } else { 90 }
          $failedModules = @()
          $coverageFound = $false
          
          foreach ($line in $summaryContent) {
            # Match lines with module names and percentages (skip Summary line)
            if ($line -match '^([^ ]+)\s+.*\s+(\d+(?:\.\d+)?)%$' -and $line -notmatch '^Summary') {
              $coverageFound = $true
              $module = $matches[1]
              $coverage = [decimal]$matches[2]
              
              Write-Host "Checking module: '$module' - Coverage: ${coverage}%" -ForegroundColor Cyan
              
              if ($coverage -lt $threshold) {
                Write-Host "  ❌ FAIL: Below ${threshold}% threshold" -ForegroundColor Red
                $failedModules += "$module (${coverage}%)"
              } else {
                Write-Host "  ✅ PASS: Meets ${threshold}% threshold" -ForegroundColor Green
              }
            }
          }
          
          # Ensure we found and parsed coverage data
          if (-not $coverageFound) {
            Write-Error "❌ Failed to parse coverage data from Summary.txt - cannot enforce threshold"
            exit 1
          }
          
          if ($failedModules.Count -gt 0) {
            Write-Host ""
            Write-Host "==========================================" -ForegroundColor Red
            Write-Host "❌ COVERAGE GATE FAILED" -ForegroundColor Red
            Write-Host "==========================================" -ForegroundColor Red
            Write-Host "Modules below ${threshold}% coverage: $($failedModules -join ', ')" -ForegroundColor Red
            exit 1
          }
          
          Write-Host ""
          Write-Host "==========================================" -ForegroundColor Green
          Write-Host "✅ All modules meet ${threshold}% coverage threshold" -ForegroundColor Green
          Write-Host "==========================================" -ForegroundColor Green

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: release-coverage
          path: CoverageReport/

  # Pack and validate NuGet package
  pack-and-validate:
    name: Pack & Validate NuGet
    needs: validate-release
    runs-on: windows-latest
    outputs:
      has-packages: ${{ steps.check-packages.outputs.has-packages }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            3.1.x
            5.0.x
            6.0.x
            7.0.x
            8.0.x
            9.0.x
            10.0.x

      - name: Restore and build
        run: |
          dotnet restore
          dotnet build --no-restore --configuration Release

      - name: Pack NuGet packages
        id: check-packages
        shell: pwsh
        run: |
          # Create output directory for NuGet packages
          $packagesPath = Join-Path $PWD 'nuget-packages'
          New-Item -ItemType Directory -Force -Path $packagesPath | Out-Null

          # Find all .csproj files in the src directory recursively
          $projects = Get-ChildItem -Path 'src' -Recurse -Filter '*.csproj'
          
          # Handle case when no projects are found (e.g., template repository)
          if ($projects.Count -eq 0) {
            Write-Warning "No projects found in src/ directory - skipping package creation"
            Write-Warning "Downstream publish and release jobs will be skipped"
            # Create empty directory for artifact upload
            New-Item -ItemType File -Path (Join-Path $packagesPath '.placeholder') -Force | Out-Null
            # Set output to indicate no packages were created
            "has-packages=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
            exit 0
          }
          
          # Iterate through each project and create NuGet package
          foreach ($proj in $projects) {
            Write-Host "📦 Packing $($proj.Name)" -ForegroundColor Cyan
            dotnet pack $proj.FullName --no-build --configuration Release --output $packagesPath
            
            # Check if pack operation failed and exit with error
            if ($LASTEXITCODE -ne 0) {
              Write-Error "❌ Pack failed for $($proj.Name)"
              exit $LASTEXITCODE
            }
          }
          
          # Check whether any .nupkg files were actually created
          $packages = Get-ChildItem -Path $packagesPath -Filter '*.nupkg' -ErrorAction SilentlyContinue
          
          if ($packages.Count -eq 0) {
            Write-Warning "No .nupkg files were produced during packing - downstream publish and release jobs will be skipped"
            "has-packages=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
            exit 0
          }
          
          # At least one package was created successfully
          Write-Host "✅ NuGet packages created successfully" -ForegroundColor Green
          "has-packages=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Smoke test NuGet package installation
        shell: pwsh
        run: |
          $packages = Get-ChildItem -Path 'nuget-packages' -Filter '*.nupkg' -ErrorAction SilentlyContinue
          
          if ($packages.Count -eq 0) {
            Write-Warning "No .nupkg files found - skipping smoke test"
            exit 0
          }
          
          # Helper to read package ID and version from the .nuspec inside a .nupkg
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          function Get-PackageMetadata {
            param (
              [Parameter(Mandatory = $true)]
              [string] $NupkgPath
            )

            $zip = [System.IO.Compression.ZipFile]::OpenRead($NupkgPath)
            try {
              $nuspecEntry = $zip.Entries | Where-Object { $_.FullName -like '*.nuspec' } | Select-Object -First 1
              if (-not $nuspecEntry) {
                throw "No .nuspec file found in package '$NupkgPath'."
              }

              $stream = $nuspecEntry.Open()
              try {
                $reader = New-Object System.IO.StreamReader($stream)
                $nuspecXml = [xml]$reader.ReadToEnd()
                $id = $nuspecXml.package.metadata.id
                $version = $nuspecXml.package.metadata.version

                if ([string]::IsNullOrWhiteSpace($id) -or [string]::IsNullOrWhiteSpace($version)) {
                  throw "Failed to read id/version from nuspec in '$NupkgPath'."
                }

                [PSCustomObject]@{
                  Id      = $id
                  Version = $version
                }
              }
              finally {
                $stream.Dispose()
              }
            }
            finally {
              $zip.Dispose()
            }
          }
          
          # Create temporary test project
          $testDir = Join-Path $PWD 'package-smoke-test'
          New-Item -ItemType Directory -Force -Path $testDir | Out-Null

          # Restrict NuGet restores in this directory to the local package source only
          $nugetConfigPath = Join-Path $testDir 'NuGet.config'
          # Build NuGet.config content as array to avoid YAML parsing issues with here-strings
          $nugetConfigContent = @(
            '<?xml version="1.0" encoding="utf-8"?>'
            '<configuration>'
            '  <packageSources>'
            '    <clear />'
            '    <add key="local" value="../nuget-packages" />'
            '  </packageSources>'
            '  <packageSourceMapping>'
            '    <packageSource key="local">'
            '      <package pattern="*" />'
            '    </packageSource>'
            '  </packageSourceMapping>'
            '</configuration>'
          )
          $nugetConfigContent | Set-Content -Path $nugetConfigPath -Encoding UTF8
          
          Push-Location $testDir
          try {
            dotnet new console -n SmokeTest -f net8.0
            
            # Try to install the newly created package(s)
            foreach ($package in $packages) {
              Write-Host "🧪 Smoke testing package: $($package.Name)" -ForegroundColor Yellow
              
              $metadata = Get-PackageMetadata -NupkgPath $package.FullName
              $packageId = $metadata.Id
              $packageVersion = $metadata.Version
              
              dotnet add SmokeTest/SmokeTest.csproj package $packageId --version $packageVersion --source '../nuget-packages'
              
              if ($LASTEXITCODE -ne 0) {
                Write-Error "❌ Failed to install package $($package.Name)"
                exit $LASTEXITCODE
              }
              
              Write-Host "✅ Package $($package.Name) installed successfully" -ForegroundColor Green
            }
            
            # Try to build the test project with the package
            Write-Host "Building smoke test project..." -ForegroundColor Yellow
            dotnet build SmokeTest/SmokeTest.csproj
            
            if ($LASTEXITCODE -ne 0) {
              Write-Error "❌ Smoke test project failed to build with installed packages"
              exit $LASTEXITCODE
            }
            
            Write-Host "✅ Smoke test passed - packages are installable and buildable" -ForegroundColor Green
            
          } finally {
            Pop-Location
          }

      - name: Generate SBOM (CycloneDX)
        if: steps.check-packages.outputs.has-packages == 'true'
        shell: pwsh
        run: |
          dotnet tool install --global CycloneDX

          $sbomDir = Join-Path $PWD 'nuget-packages'
          $srcProjects = Get-ChildItem -Path 'src' -Filter '*.csproj' -Recurse -ErrorAction SilentlyContinue

          if ($srcProjects.Count -eq 0) {
            Write-Warning "No projects found in src/ - skipping SBOM generation"
            return
          }

          foreach ($proj in $srcProjects) {
            $sbomName = "$($proj.BaseName).bom.json"
            $sbomPath = Join-Path $sbomDir $sbomName

            Write-Host "📋 Generating SBOM for $($proj.Name)" -ForegroundColor Cyan
            dotnet CycloneDX $proj.FullName --output $sbomDir --filename $sbomName --json

            if ($LASTEXITCODE -ne 0) {
              Write-Warning "⚠️ SBOM generation failed for $($proj.Name) - continuing"
            } else {
              Write-Host "✅ SBOM generated: $sbomName" -ForegroundColor Green
            }
          }


      - name: Upload NuGet packages
        uses: actions/upload-artifact@v7
        with:
          name: nuget-packages
          path: ./nuget-packages/
          retention-days: 90
          if-no-files-found: warn

  # ============================================================================
  # RDBMS INTEGRATION (release-time gate) — closes the gap flagged in #206.
  # Mirrors pr.yaml's test-integration matrix but runs against the released
  # tag's commit instead of a PR head. Testcontainers (Linux only) — sqlite
  # included so a single matrix shape covers every supported provider.
  # ============================================================================
  test-integration:
    name: "Integration / ${{ matrix.rdbms }} (${{ matrix.tfm }})"
    needs: validate-release
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        rdbms: [sqlserver, postgres, mysql, mariadb, sqlite]
        tfm: [net8.0, net10.0]

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Locate integration project
        id: locate
        shell: bash
        run: |
          # Match all three project extensions so a future VB/F# rewrite is found.
          proj=$(find ./tests -type f \
            \( -name "*.Tests.Integration.csproj" \
            -o -name "*.Tests.Integration.vbproj" \
            -o -name "*.Tests.Integration.fsproj" \) \
            | head -n1)
          if [ -z "$proj" ]; then
            echo "ℹ️  No integration project found — skipping."
            echo "found=false" >> "$GITHUB_OUTPUT"
          else
            echo "Integration project: $proj"
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "project=$proj" >> "$GITHUB_OUTPUT"
          fi

      - name: Run ${{ matrix.rdbms }} integration tests (${{ matrix.tfm }})
        if: steps.locate.outputs.found == 'true'
        run: |
          dotnet test "${{ steps.locate.outputs.project }}" \
            --configuration Release \
            --framework ${{ matrix.tfm }} \
            --filter "Category=${{ matrix.rdbms }}" \
            -p:TreatWarningsAsErrors=true \
            --logger "console;verbosity=normal" \
            --logger "trx;LogFileName=integration-${{ matrix.rdbms }}-${{ matrix.tfm }}.trx" \
            --results-directory "./TestResults-Integration"

      - name: Upload integration test results
        if: always() && steps.locate.outputs.found == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: release-integration-${{ matrix.rdbms }}-${{ matrix.tfm }}-trx
          path: TestResults-Integration/

  # ============================================================================
  # INTEGRATION AGGREGATOR (release-time)
  # Single stable job that rolls the matrix into one pass/fail signal — same
  # pattern as pr.yaml's test-integration-all. publish-nuget needs THIS job,
  # so the matrix can grow / change TFMs without re-wiring the publish gate.
  # ============================================================================
  test-integration-all:
    name: "Integration (all)"
    needs: test-integration
    runs-on: ubuntu-latest
    if: always()
    env:
      INTEGRATION_RESULT: ${{ needs.test-integration.result }}
    steps:
      - name: Check matrix result
        run: |
          echo "test-integration = $INTEGRATION_RESULT"
          if [ "$INTEGRATION_RESULT" = "success" ]; then
            echo "✅ Integration aggregator passes (all cells succeeded)"
            exit 0
          fi
          echo "❌ Integration aggregator FAILS — release gate blocks the publish."
          exit 1

  # ABI compatibility gate: for a PATCH/MINOR release, break the build
  # if the new package's public surface is binary-incompatible with the
  # last version on nuget.org. MAJOR releases record intentional breaks
  # in compat-suppressions.txt (checked in) so they don't recur silently.
  # Refs #136.
  api-compat:
    name: ApiCompat vs last NuGet
    needs: pack-and-validate
    if: needs.pack-and-validate.outputs.has-packages == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@d4c94342e560b34958eacfc5d055d21461ed1c5d # v5.0.0
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Download packed artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: nuget-packages
          path: ./packages

      - name: Install ApiCompat tool
        run: dotnet tool install --global Microsoft.DotNet.ApiCompat.Tool

      - name: Run ApiCompat
        id: apicompat
        shell: bash
        env:
          PKG_ID: Wolfgang.Etl.DbClient
        run: |
          set -euo pipefail

          # Determine package id + version from the freshly-packed .nupkg.
          # Use find (not `ls <glob>`) so an empty match returns cleanly
          # instead of tripping `set -e` before the friendly diagnostic.
          new_nupkg=$(find packages -maxdepth 1 -name "${PKG_ID}.*.nupkg" ! -name '*.symbols.nupkg' | head -1)
          if [ -z "$new_nupkg" ]; then
            echo "❌ No runtime .nupkg in ./packages"
            ls -la packages/ || true
            exit 1
          fi
          fname=$(basename "$new_nupkg" .nupkg)
          # <PKG_ID>.<major>.<minor>.<patch>[-suffix] → strip the id prefix.
          # Quote the pattern expansion inside ${var#...} so shellcheck's
          # SC2295 is satisfied (unquoted, it would be treated as a glob).
          new_version=${fname#"${PKG_ID}."}
          echo "New package: ${PKG_ID}@$new_version"

          # Look up the previous stable version from nuget.org (excludes the
          # version we're about to publish + any pre-release tags). Parse
          # with python3 — guaranteed on ubuntu-latest and doesn't depend
          # on `jq` staying on the runner image.
          pkg_lc=$(printf '%s' "$PKG_ID" | tr '[:upper:]' '[:lower:]')
          # One-liner python so the YAML block scalar isn't broken by the
          # embedded newlines a multi-line `python3 -c '...'` needs.
          # actionlint's YAML parser is strict about outdented lines
          # inside `run: |` blocks.
          prev_version=$(
            curl -sSf "https://api.nuget.org/v3-flatcontainer/${pkg_lc}/index.json" \
              | NEW_VERSION="$new_version" python3 -c 'import json, os, sys; d=json.load(sys.stdin); n=os.environ["NEW_VERSION"]; s=[v for v in d.get("versions", []) if "-" not in v and v!=n]; print(s[-1] if s else "")'
          )

          if [ -z "$prev_version" ]; then
            echo "ℹ️  No prior stable version on nuget.org — first release or first stable. Skipping compat check."
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Previous stable: Wolfgang.Etl.DbClient@$prev_version"
          echo "prev-version=$prev_version" >> "$GITHUB_OUTPUT"

          # Download previous nupkg
          mkdir -p prev
          curl -sSfL \
            "https://api.nuget.org/v3-flatcontainer/${pkg_lc}/$prev_version/${pkg_lc}.$prev_version.nupkg" \
            -o "prev/prev.nupkg"

          # Extract both nupkgs
          unzip -q "$new_nupkg" -d new
          unzip -q "prev/prev.nupkg" -d prev/pkg

          # Compare per TFM. All TFMs the package declares must be
          # binary-compatible with the same TFM in the previous version
          # (unless suppressed in compat-suppressions.txt or this is a
          # MAJOR bump — the workflow doesn't distinguish; suppressions
          # are the escape hatch).
          # Array so the individual flag + path stay as separate arguments
          # when expanded (shellcheck SC2086 — string interpolation would
          # word-split incorrectly if either token ever contained whitespace).
          suppression_args=()
          if [ -f compat-suppressions.txt ]; then
            suppression_args=(--suppression-file compat-suppressions.txt)
          fi

          # `while read` (not `for x in $(find ...)`) so filenames with
          # spaces or newlines don't wordsplit (shellcheck SC2044).
          exit_code=0
          while IFS= read -r -d '' new_dll; do
            tfm=$(basename "$(dirname "$new_dll")")
            prev_dll="prev/pkg/lib/$tfm/Wolfgang.Etl.DbClient.dll"
            if [ ! -f "$prev_dll" ]; then
              echo "ℹ️  TFM $tfm is new in this release (no previous DLL) — skipping."
              continue
            fi
            echo ""
            echo "🔍 ApiCompat: $tfm"
            if ! apicompat --left "$prev_dll" --right "$new_dll" "${suppression_args[@]}"; then
              echo "❌ ApiCompat FAILED for $tfm"
              exit_code=1
            fi
          done < <(find new/lib -name Wolfgang.Etl.DbClient.dll -print0)
          exit $exit_code

  # SourceLink structural gate — verifies the freshly-packed .snupkg carries
  # a portable PDB for every runtime TFM so consumers get F11-into-source
  # after publish. Full-format (Windows-only) PDBs are an immediate fail —
  # SourceLink is portable-PDB only. Refs #144.
  sourcelink-snupkg:
    name: SourceLink structural verify (.snupkg)
    needs: pack-and-validate
    if: needs.pack-and-validate.outputs.has-packages == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Download packed artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: nuget-packages
          path: ./packages

      - name: Verify .snupkg carries portable PDBs
        shell: bash
        run: |
          set -euo pipefail
          snupkgs=$(find packages -maxdepth 1 -name 'Wolfgang.Etl.DbClient.*.snupkg' || true)
          if [ -z "$snupkgs" ]; then
            echo "❌ No .snupkg in ./packages — SourceLink verification cannot run."
            ls -la packages/ || true
            exit 1
          fi

          fail=0
          for snupkg in $snupkgs; do
            echo "::group::$snupkg"
            work=$(mktemp -d)
            unzip -q "$snupkg" -d "$work"

            # Every runtime TFM MUST have a PDB under lib/<tfm>/. Missing
            # entries mean SymbolPackageFormat/IncludeSymbols got misconfigured
            # somewhere upstream — consumers on that TFM would fall back to
            # decompiled placeholders in the debugger.
            pdbs=$(find "$work/lib" -name 'Wolfgang.Etl.DbClient.pdb' | sort)
            if [ -z "$pdbs" ]; then
              echo "::error::No PDBs found under $snupkg / lib/*/"
              fail=1
              echo "::endgroup::"
              continue
            fi

            for pdb in $pdbs; do
              tfm=$(basename "$(dirname "$pdb")")
              # Portable-PDB magic = 'B','S','J','B' (0x42 0x53 0x4A 0x42)
              # in the first 4 bytes. Full-format Windows PDBs start with
              # "Microsoft C/C++ MSF 7.00" — an immediate fail.
              magic=$(head -c 4 "$pdb" | od -An -tx1 | tr -d ' \n')
              if [ "$magic" != "42534a42" ]; then
                echo "::error::PDB is NOT portable (magic=0x$magic, expected 42534A42) — TFM $tfm"
                fail=1
              else
                echo "✅ $tfm — portable PDB (magic BSJB)"
              fi
            done

            echo "::endgroup::"
            rm -rf "$work"
          done

          exit $fail

  # Publish to NuGet (only if validation + integration + api-compat + sourcelink passed)
  publish-nuget:
    name: Publish to NuGet.org
    needs: [pack-and-validate, test-integration-all, api-compat, sourcelink-snupkg]
    if: needs.pack-and-validate.outputs.has-packages == 'true'
    runs-on: windows-latest
    permissions:
      id-token: write   # required for OIDC token issuance to nuget.org
      contents: read
    steps:
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            3.1.x
            5.0.x
            6.0.x
            7.0.x
            8.0.x
            9.0.x
            10.0.x

      - name: Download packages
        uses: actions/download-artifact@v8.0.1
        with:
          name: nuget-packages
          path: ./packages

      - name: NuGet login (OIDC → temporary API key)
        uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841 # v1
        id: nuget-login
        with:
          user: Chris-Wolfgang

      - name: Publish to NuGet
        shell: pwsh
        env:
          NUGET_API_KEY: ${{ steps.nuget-login.outputs.NUGET_API_KEY }}
        run: |
          $packages = Get-ChildItem -Path './packages' -Filter '*.nupkg' -ErrorAction SilentlyContinue
          
          if ($packages.Count -eq 0) {
            Write-Warning "No .nupkg files found - nothing to publish"
            exit 0
          }
          
          foreach ($package in $packages) {
            Write-Host "📤 Publishing $($package.Name) to NuGet.org" -ForegroundColor Cyan
            
            dotnet nuget push $package.FullName `
              --api-key $env:NUGET_API_KEY `
              --source https://api.nuget.org/v3/index.json `
              --skip-duplicate
            
            # Exit code 0 = success, 409 would be duplicate (handled by --skip-duplicate flag)
            if ($LASTEXITCODE -ne 0) {
              Write-Error "❌ Failed to publish $($package.Name)"
              exit $LASTEXITCODE
            }
            
            Write-Host "✅ Successfully published $($package.Name)" -ForegroundColor Green
          }
          
          Write-Host ""
          Write-Host "==========================================" -ForegroundColor Green
          Write-Host "✅ All packages published to NuGet.org" -ForegroundColor Green
          Write-Host "==========================================" -ForegroundColor Green

  # SourceLink post-publish smoke — after publish-nuget succeeds, poll the
  # NuGet symbol server for the just-uploaded PDB. Uses dotnet-symbol which
  # implements the SSQP protocol + follows the debug-directory signature
  # in the DLL to compute the correct URL. Retries with backoff — the
  # NuGet symbol server ingests .snupkg content on a delay measured in
  # minutes (typical 5–30). Refs #144.
  sourcelink-symbol-server-smoke:
    name: SourceLink symbol-server smoke (post-publish)
    needs: publish-nuget
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Setup .NET
        uses: actions/setup-dotnet@d4c94342e560b34958eacfc5d055d21461ed1c5d # v5.0.0
        with:
          dotnet-version: 10.0.x

      - name: Download packed artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: nuget-packages
          path: ./packages

      - name: Install dotnet-symbol
        run: dotnet tool install --global dotnet-symbol

      - name: Extract a representative DLL from the packed .nupkg
        shell: bash
        run: |
          set -euo pipefail
          nupkg=$(find packages -maxdepth 1 -name 'Wolfgang.Etl.DbClient.*.nupkg' ! -name '*.symbols.nupkg' | head -1)
          if [ -z "$nupkg" ]; then
            echo "::error::No runtime .nupkg to probe."
            exit 1
          fi
          mkdir -p probe
          unzip -q "$nupkg" -d probe
          # Grab the net10.0 DLL if present, otherwise any TFM.
          dll=$(find probe/lib -name 'Wolfgang.Etl.DbClient.dll' | sort | tail -1)
          if [ -z "$dll" ]; then
            echo "::error::No runtime DLL in the packed .nupkg."
            find probe/lib -type f | head
            exit 1
          fi
          echo "PROBE_DLL=$dll" >> "$GITHUB_ENV"
          echo "Probing symbols for: $dll"

      - name: Poll symbol server for published PDB (retry with backoff)
        shell: bash
        run: |
          set -euo pipefail
          export PATH="$PATH:$HOME/.dotnet/tools"

          # nuget.org's symbol server URL (SSQP endpoint). dotnet-symbol
          # defaults to msdl.microsoft.com — override to hit nuget.org.
          server='https://symbols.nuget.org/download/symbols/'

          # Retry loop: NuGet symbol ingestion is typically 5–30 min. Poll
          # every 60s for up to 30 min, then fail.
          out=$(mktemp -d)
          attempts=30
          for i in $(seq 1 "$attempts"); do
            echo "Attempt $i/$attempts — dotnet-symbol from $server"
            if dotnet-symbol --symbols --server-path "$server" --output "$out" "$PROBE_DLL"; then
              # Success if a PDB actually landed in the output dir.
              if find "$out" -name '*.pdb' | grep -q .; then
                echo "✅ Symbol server served the PDB on attempt $i."
                exit 0
              fi
            fi
            echo "  not-yet — sleeping 60s"
            sleep 60
          done

          echo "::error::Symbol server did not serve the published PDB after $((attempts*60))s of polling."
          exit 1

  # Build and deploy versioned documentation via the shared docfx workflow
  # Note: reusable workflow jobs called via `uses:` do not require `runs-on` in the caller
  trigger-docs:
    name: Build & Deploy Documentation
    needs: validate-release
    permissions:
      contents: write  # Required by docfx.yaml to push to gh-pages branch
    uses: ./.github/workflows/docfx.yaml
    with:
      version: ${{ github.event.release.tag_name }}

  # Attach NuGet packages and coverage report to the GitHub Release page
  update-release-artifacts:
    name: Attach Artifacts to Release
    needs: [validate-release, pack-and-validate, publish-nuget]
    if: needs.pack-and-validate.outputs.has-packages == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required to upload assets to the GitHub Release
    steps:
      - name: Download NuGet packages artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: nuget-packages
          path: ./nuget-packages

      - name: Download coverage report artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: release-coverage
          path: ./release-coverage

      - name: Zip coverage report
        run: zip -r release-coverage.zip ./release-coverage

      - name: Attach artifacts to release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b  # v3.0.1
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: |
            ./nuget-packages/*.nupkg
            ./nuget-packages/*.bom.json
            release-coverage.zip

